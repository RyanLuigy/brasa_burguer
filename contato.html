<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Brasa Burguer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo"><img src="assets/logo3brasaburguer.png" alt="Logo"></div>
            <ul class="nav-links">
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html" class="active">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="container page-content">
        <h1>Fale Conosco</h1>
        <div class="contact-container">
            <form class="contact-form">
                <input type="text" placeholder="Seu Nome completo" required>
                <input type="email" placeholder="Seu melhor e-mail" required>
                <textarea placeholder="Como podemos te ajudar?" rows="5" required></textarea>
                <button type="submit" class="btn-main">Enviar Mensagem</button>
            </form>

            <div class="contact-info">
                <h3>Canais de Atendimento</h3>
                <p>Envie um e-mail: <a href="mailto:contato@brasaburguer.com">contato@brasaburguer.com</a></p>
                <p>Ligue para nós: <a href="tel:557199999-9999">(71) 99999-9999</a></p>
                <div class="social-box">
                    <p>Siga-nos:</p>
                    <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram fa-2x"></i></a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2023 Brasa Burguer - Qualidade em cada brasa.</p>
        </div>
    </footer>
</body>
</html>
